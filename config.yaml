api:
  enable: true
  host: 0.0.0.0
  port: 8888
danmaku:
  enable: false
  output_dir: recordings/danmaku
log:
  console: true
  file: logs/app.log
  level: info
record:
  filename_template: '{platform}/{room_id}/{year}/{month}/{day}/{title}_{time}'
  format: flv
  output_dir: recordings
  quality: origin
rooms: []
version: '1.0'
webhook:
  enable: false
  events:
  - live_start
  - live_end
  - download_complete
  url: ''
